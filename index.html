<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VenturAI</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --card2: #16213e;
    --accent: #7c3aed; --accent2: #a855f7; --accent3: #06b6d4;
    --text: #e2e8f0; --muted: #94a3b8; --border: #2d2d4e;
    --success: #10b981; --danger: #ef4444;
    --radius: 14px; --shadow: 0 8px 32px rgba(124,58,237,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    border-bottom: 1px solid var(--border); padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 28px; }
  .logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .lang-selector { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .lang-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: all .2s; white-space: nowrap; }
  .lang-btn:hover, .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { max-width: 800px; margin: 0 auto; padding: 36px 20px 60px; }
  .hero { text-align: center; margin-bottom: 40px; }
  .hero h1 { font-size: clamp(28px, 6vw, 48px); font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
  .hero h1 span { background: linear-gradient(135deg, var(--accent2), var(--accent3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); font-size: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow); }
  .card-title { font-size: 16px; font-weight: 700; color: var(--accent2); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media(max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; color: var(--muted); font-weight: 600; letter-spacing: .5px; }
  input, select, textarea { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; border-radius: 10px; font-size: 14px; width: 100%; transition: border-color .2s, box-shadow .2s; outline: none; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,.2); }
  textarea { resize: vertical; min-height: 100px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 28px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: all .2s; letter-spacing: .3px; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,.4); width: 100%; margin-top: 8px; font-size: 16px; padding: 16px; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.5); }
  .btn-secondary { background: var(--card2); border: 1px solid var(--border); color: var(--text); flex: 1; }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-cyan { background: linear-gradient(135deg, #0891b2, var(--accent3)); color: #fff; box-shadow: 0 4px 20px rgba(6,182,212,.3); flex: 1; }
  .btn-cyan:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(6,182,212,.4); }
  .btn-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  #loading { display: none; text-align: center; padding: 60px 20px; }
  .spinner { width: 52px; height: 52px; border: 4px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 15px; }
  .loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%{content:'...'} 80%,100%{content:''} }
  #result { display: none; }
  .itinerary-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }
  .itinerary-box h3 { color: var(--accent2); font-size: 20px; margin: 20px 0 8px; }
  .itinerary-box h3:first-child { margin-top: 0; }
  .itinerary-box h4 { color: var(--accent3); font-size: 16px; margin: 14px 0 6px; }
  .itinerary-box p { color: var(--text); line-height: 1.7; margin-bottom: 10px; font-size: 14px; }
  .itinerary-box ul { padding-left: 20px; margin-bottom: 12px; }
  .itinerary-box li { color: #cbd5e1; line-height: 1.7; font-size: 14px; margin-bottom: 4px; }
  #survey { margin-top: 32px; }
  .survey-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid var(--accent); border-radius: var(--radius); padding: 24px; position: relative; }
  .survey-close { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; transition: color .2s; }
  .survey-close:hover { color: var(--danger); }
  .survey-q { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
  .survey-options { display: flex; gap: 12px; flex-wrap: wrap; }
  .survey-opt { background: var(--card2); border: 2px solid var(--border); color: var(--text); padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .survey-opt.yes:hover, .survey-opt.yes.selected { border-color: var(--success); color: var(--success); background: rgba(16,185,129,.1); }
  .survey-opt.no:hover, .survey-opt.no.selected { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,.1); }
  .survey-textarea { width: 100%; margin-top: 14px; }
  .survey-submit { margin-top: 12px; background: var(--accent); border: none; color: #fff; padding: 10px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; transition: all .2s; }
  .survey-submit:hover { background: var(--accent2); }
  .survey-thanks { text-align: center; padding: 20px; }
  .survey-thanks .emoji { font-size: 40px; display: block; margin-bottom: 12px; }
  .survey-thanks p { color: var(--muted); font-size: 15px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,58,237,.15); border: 1px solid rgba(124,58,237,.3); color: var(--accent2); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 16px; }
  .error-box { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; border-radius: 10px; padding: 14px 18px; font-size: 14px; margin-top: 12px; }
</style>

      <button class="btn btn-cyan" onclick="resetApp()">✨ <span id="newText">Nueva VenturA</span></button>

let currentLang = 'es';
let lastFormData = null;

function init() {
  renderLangButtons();
  applyLang('es');
}

function renderLangButtons() {
  const el = document.getElementById('langSelector');
  el.innerHTML = Object.values(langs).map(l =>
    `<button class="lang-btn${l.code===currentLang?' active':''}" onclick="applyLang('${l.code}')">${l.flag} ${l.name}</button>`
  ).join('');
}

function applyLang(code) {
  currentLang = code;
  const t = langs[code];
  document.getElementById('logo-sub').textContent = t.logoSub;
  document.getElementById('hero-title').innerHTML = t.heroTitle + '<br><span id="hero-span">'+t.heroSpan+'</span>';
  document.getElementById('hero-desc').textContent = t.heroDesc;
  document.getElementById('formTitle').textContent = t.formTitle;
  document.getElementById('lbl-place').textContent = t.lblPlace;
  document.getElementById('lbl-people').textContent = t.lblPeople;
  document.getElementById('lbl-duration').textContent = t.lblDuration;
  document.getElementById('lbl-budget').textContent = t.lblBudget;
  document.getElementById('lbl-prefs').textContent = t.lblPrefs;
  document.getElementById('place').placeholder = t.phPlace;
  document.getElementById('duration').placeholder = t.phDuration;
  document.getElementById('budget').placeholder = t.phBudget;
  document.getElementById('prefs').placeholder = t.phPrefs;
  document.getElementById('btnText').textContent = t.btnGenerate;
  document.getElementById('loadingMsg').textContent = t.loading;
  document.getElementById('badgeText').textContent = t.badge;
  document.getElementById('regenText').textContent = t.regenBtn;
  document.getElementById('newText').textContent = t.newBtn;
  renderLangButtons();
}

async function generateItinerary() {
  const t = langs[currentLang];
  const place = document.getElementById('place').value.trim();
  const people = document.getElementById('people').value.trim();
  const duration = document.getElementById('duration').value.trim();
  const budget = document.getElementById('budget').value.trim();
  const prefs = document.getElementById('prefs').value.trim();
  const errEl = document.getElementById('formError');
  
  errEl.innerHTML = '';
  if (!place)     { errEl.innerHTML = `<div class="error-box">⚠️ ${t.errPlace}</div>`; return; }
  if (!duration)  { errEl.innerHTML = `<div class="error-box">⚠️ ${t.errDuration}</div>`; return; }
  if (!budget)    { errEl.innerHTML = `<div class="error-box">⚠️ ${t.errBudget}</div>`; return; }
  
  lastFormData = { place, people, duration, budget, prefs };
  showLoading();
  await callAI(place, people, duration, budget, prefs);
}

async function regenerate() {
  if (!lastFormData) return;
  const { place, people, duration, budget, prefs } = lastFormData;
  showLoading();
  await callAI(place, people, duration, budget, prefs);
}

function showLoading() {
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('heroSection').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
}

async function callAI(place, people, duration, budget, prefs) {
  const t = langs[currentLang];
  const userPrompt = `Genera un itinerario de viaje completo y detallado con los siguientes datos:
- Lugar: ${place}
- Número de personas: ${people}
- Duración: ${duration}
- Presupuesto total: ${budget}
- Preferencias: ${prefs || 'Sin preferencias específicas'}
 
Crea un itinerario día a día con actividades, restaurantes, alojamiento y consejos de transporte. Adapta completamente las recomendaciones al presupuesto indicado.
Usa únicamente etiquetas HTML h3, h4, p, ul, li. No incluyas etiquetas html, head, body ni ninguna otra.`;
 
  try {
    // CAMBIO CLAVE: Ahora llamamos a tu función de Cloudflare de forma segura
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        system: t.promptRole,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
 
    if (!res.ok) {
      let errorMsg = `Error HTTP ${res.status}`;
      try {
        const err = await res.json();
        errorMsg = err?.error?.message || errorMsg;
      } catch(e) {}
      showResult(`<p style="color:#fca5a5">⚠️ Error en el servidor proxy: ${errorMsg}</p>`);
      return;
    }
 
    const data = await res.json();
    let html = '';
    
    if (Array.isArray(data.content)) {
      html = data.content
        .filter(block => block.type === 'text')
        .map(block => block.text)
        .join('') || '<p>No se pudo generar el itinerario.</p>';
    } else {
      html = '<p style="color:#fca5a5">⚠️ Respuesta inesperada del servidor proxy.</p>';
    }
    showResult(html);
  } catch(e) {
    let msg = e.message || 'Error desconocido';
    if (msg.toLowerCase().includes('failed to fetch') || msg.toLowerCase().includes('networkerror')) {
      msg = 'Error de red. Asegúrate de estar conectado a Internet.';
    }
    showResult(`<p style="color:#fca5a5">⚠️ Error de conexión: ${msg}</p>`);
  }
}
 
function showResult(html) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('itineraryContent').innerHTML = html;
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  renderSurvey();
}
 
function resetApp() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('heroSection').style.display = 'block';
  document.getElementById('place').value = '';
  document.getElementById('people').value = '2';
  document.getElementById('duration').value = '';
  document.getElementById('budget').value = '';
  document.getElementById('prefs').value = '';
  document.getElementById('formError').innerHTML = '';
  document.getElementById('survey').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
 
function renderSurvey() {
  const surveyEl = document.getElementById('survey');
  surveyEl.innerHTML = '';
  const t = langs[currentLang];
  surveyEl.innerHTML = `
    <div class="survey-card" id="surveyCard">
      <button class="survey-close" onclick="closeSurvey()">✕</button>
      <div id="surveyStep1">
        <div class="survey-q">⭐ ${t.surveyQ1}</div>
        <div class="survey-options">
          <button class="survey-opt yes" onclick="surveyAnswer1('yes')">${t.surveyYes}</button>
          <button class="survey-opt no" onclick="surveyAnswer1('no')">${t.surveyNo}</button>
        </div>
      </div>
      <div id="surveyStep2" style="display:none"></div>
    </div>`;
}
 
function surveyAnswer1(ans) {
  const t = langs[currentLang];
  const step2 = document.getElementById('surveyStep2');
  document.getElementById('surveyStep1').style.display = 'none';
  step2.style.display = 'block';
  if (ans === 'yes') {
    step2.innerHTML = `<div class="survey-q">🎉 ${t.surveyQ2Yes}</div>
      <div class="survey-options">
        <button class="survey-opt yes" onclick="surveyDone()">${t.surveyYes}</button>
        <button class="survey-opt no" onclick="surveyDone()">${t.surveyNo}</button>
      </div>`;
  } else {
    step2.innerHTML = `<div class="survey-q">💬 ${t.surveyQ2No}</div>
      <textarea class="survey-textarea" id="surveyFeedback" placeholder="${t.surveyPhFeedback}" rows="3"></textarea>
      <br><button class="survey-submit" onclick="surveyDone()">${t.surveySubmit}</button>`;
  }
}
 
function surveyDone() {
  const t = langs[currentLang];
  try { localStorage.setItem('venturai_feedback_completed', '1'); } catch(e) {}
  document.getElementById('surveyCard').innerHTML = `
    <div class="survey-thanks">
      <span class="emoji">🙏</span>
     <p><strong>${t.surveyThanks}</strong></p>
      <p>${t.surveyThanksDesc}</p>
    </div>`;
}
 
function closeSurvey() {
  try { localStorage.setItem('venturai_feedback_completed', '1'); } catch(e) {}
  document.getElementById('survey').innerHTML = '';
}
init();
</script>
